<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character — Audit</title>
    <meta name="description" content="WoW Guild Audit — character details.">
    <link rel="icon" type="image/x-icon" href="https://wow.zamimg.com/images/wow/icons/medium/inv_scroll_11.jpg">
    <link rel="stylesheet" href="styles.css?v=7">
</head>

<body>

    <div class="app-container">

        <header class="hdr">
            <div class="hdr-left">
                <a href="index.html" class="hdr-title" id="hdr-title"
                    style="text-decoration:none;color:inherit">GuildAudit</a>
                <div class="hdr-meta"><span id="rdot"></span><span id="rts">—</span></div>
            </div>
            <div class="hdr-right">
                <span id="hmeta" style="font-size:.85rem;color:var(--text-dim)"></span>
                <a href="index.html" class="btn btn-secondary btn-sm perm-officer perm-inline" id="btnRefresh">↻ <span
                        class="t-refresh">Atualizar</span></a>
                <a href="index.html" class="btn btn-secondary btn-sm perm-officer perm-inline">⬇ <span
                        class="t-export">Exportar</span></a>
                <a href="index.html" class="btn btn-primary btn-sm perm-officer perm-inline">⬆ <span
                        class="t-import">Importar</span></a>
                <div id="user-info" style="display:none;align-items:center;gap:8px">
                    <span id="user-battletag" style="font-size:.85rem;color:var(--text)"></span>
                    <span id="user-perm" class="perm-badge"></span>
                    <button class="btn btn-secondary btn-sm" onclick="logoutBattleNet()" title="Logout">⏻</button>
                </div>
                <button id="btn-login" class="btn btn-primary btn-sm" onclick="loginBattleNet()">🔗 Login</button>
            </div>
        </header>

        <div class="nav" id="navTabs">
            <a class="nav-tab" href="index.html#overview"><span class="t-overview">Overview</span></a>
            <a class="nav-tab perm-officer" href="index.html#roster"><span class="t-roster">Roster</span></a>
            <a class="nav-tab" href="index.html#vault"><span class="t-vault">Great Vault</span></a>
            <a class="nav-tab perm-officer" href="index.html#settings"><span class="t-settings">Configurações</span></a>

            <div style="margin-left:auto; display:flex; align-items:center; padding-right:12px;">
                <select id="cfg-dispLang" class="lang-select" onchange="saveLang();applyI18n();rerenderChar()">
                    <option value="pt-BR">PT-BR</option>
                    <option value="en">EN</option>
                </select>
            </div>
        </div>

        <div class="char-page-header">
            <a href="index.html" class="btn btn-secondary btn-sm"><span class="t-back">← Voltar</span></a>
            <span id="cp-bc" style="font-size:.8rem;color:var(--text-dim)"></span>
        </div>
        <div class="char-page-body">
            <div class="char-sidebar" id="cp-sidebar"></div>
            <div class="char-main" id="cp-main"></div>
        </div>

    </div>

    <div id="notif"></div>

    <script src="data.js?v=7"></script>
    <script src="api.js?v=7"></script>
    <script src="render.js?v=7"></script>
    <script src="auth.js?v=7"></script>
    <script src="char.js?v=7"></script>
    <script>
        window.whTooltips = { colorLinks: false, iconizeLinks: false, renameLinks: true };
    </script>
    <script src="https://wow.zamimg.com/js/tooltips.js"></script>
</body>

</html>
